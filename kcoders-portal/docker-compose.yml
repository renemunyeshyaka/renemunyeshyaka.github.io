services:
  postgres:
    image: postgres:15-alpine
    container_name: kcoders-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kcoders-api
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL}
      APP_NAME: ${APP_NAME}
      TOTP_ISSUER: ${TOTP_ISSUER}
      STORAGE_PATH: /app/storage
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5003
    container_name: kcoders-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5003
    ports:
      - "3003:3003"
    depends_on:
      - backend

volumes:
  postgres_data:
  storage_data:
